# fly.toml app configuration file generated for codelive-backend on 2026-03-05T19:28:09-06:00
#
# Deploy this app from repo root so Docker build context includes /content:
#   fly deploy --config backend/fly.toml .
#
# See https://fly.io/docs/reference/configuration/ for information about this file.
#

app = 'codelive-backend'
primary_region = 'ord'
kill_signal = 'SIGTERM'
kill_timeout = 30

[build]
  dockerfile = 'Dockerfile'
  ignorefile = '../.dockerignore'

[env]
  NODE_ENV = 'production'
  RUN_EXECUTION_MODE = 'proxy'
  RUNNER_BASE_URL = 'http://codelive-runner.internal:5000'
  RUN_RATE_LIMIT_ENABLED = 'true'
  RUN_RATE_LIMIT_WINDOW_MS = '60000'
  RUN_RATE_LIMIT_MAX = '30'

[processes]
  app = 'node dist/index.js'

[http_service]
  processes = ['app']
  internal_port = 5000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 60
    soft_limit = 45

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'
    protocol = 'http'

    [http_service.checks.headers]
      X-Forwarded-Proto = 'https'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  persist_rootfs = 'never'
