services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"
    volumes:
      # Mount the entire backend directory for hot reload.
      # The named volume overlays node_modules so they stay container-managed
      # and are never mixed with anything on the host.
      - ./backend:/app:z
      - ./content:/content:z
      - backend_nm:/app/node_modules
    environment:
      NODE_ENV: development
      PORT: "5000"
      PYTHON_BIN: /opt/codelive-venv/bin/python
      CORS_ORIGINS: http://localhost:3000
      # Secrets below are injected by Infisical at runtime (no value = pass-through).
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      # Mount the entire frontend directory for hot reload.
      # The named volume overlays node_modules so they stay container-managed.
      - ./frontend:/app:z
      - frontend_nm:/app/node_modules
    environment:
      # Default: connect to the backend service on the Docker Compose network.
      # Override with VITE_BACKEND_URL=https://... to point at a remote backend.
      VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://backend:5000}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    depends_on:
      - backend

volumes:
  backend_nm:
  frontend_nm:
